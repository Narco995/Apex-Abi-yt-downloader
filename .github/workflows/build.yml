name: Build Windows Executable

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js + npm cache ──────────────────────────────────────────────────
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'           # caches ~/.npm between runs

      # ── Rust stable toolchain ───────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── Rust compilation cache (cuts build time from ~30min → ~5min) ────────
      - name: Cache Rust compilation
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true   # cache even if build fails (helps subsequent runs)

      # ── Install Node deps ────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      # ── Build Tauri app (tauri-action handles frontend build via beforeBuildCommand) ──
      # Do NOT add a separate "npm run build" step here — tauri.conf.json already
      # defines beforeBuildCommand: "npm run build", so tauri-action triggers it
      # automatically. A duplicate step causes a double-build race condition.
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Only build NSIS installer (WiX/MSI requires WiX 4 which is NOT
          # pre-installed on windows-latest; "all" targets would fail on MSI)
          args: --target x86_64-pc-windows-msvc --bundles nsis

      # ── Upload the .exe installer as a build artifact ────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: abi-yt-downloader-windows-x64
          # tauri-action with --target puts output here (not target/release/)
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

  # ── Create GitHub release on tag push ─────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write    # required for softprops/action-gh-release to create releases

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
