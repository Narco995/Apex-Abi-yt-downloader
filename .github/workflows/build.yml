name: Build Windows Executable

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ── Permissions: write-all so tauri-action can upload artifacts & create releases
permissions:
  contents: write
  packages: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Install Node.js 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      # ── Rust stable ──────────────────────────────────────────────────────────
      - name: Install Rust stable (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@4305c38b25d97ef35a8ad1f985ccf2d2242004f2 # stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── Rust compilation cache (30min → ~5min) ───────────────────────────────
      - name: Cache Rust compilation
        uses: Swatinem/rust-cache@9d47c6ad4a02074aa22b41d49c5c6d9a9d5f6700 # v2.7.8
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      # ── Install yt-dlp ───────────────────────────────────────────────────────
      # yt-dlp is NOT pre-installed on windows-latest; the app needs it at runtime
      # and check_dependencies() calls it — missing binary = CI runtime failures.
      - name: Install yt-dlp
        run: |
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -o "$env:USERPROFILE\AppData\Local\Microsoft\WindowsApps\yt-dlp.exe"
          yt-dlp --version
        shell: pwsh

      # ── Install ffmpeg ───────────────────────────────────────────────────────
      # ffmpeg is required for audio extraction and format merging.
      - name: Install ffmpeg
        run: choco install ffmpeg --no-progress -y
        shell: pwsh

      # ── Verify both tools ────────────────────────────────────────────────────
      - name: Verify yt-dlp and ffmpeg
        run: |
          yt-dlp --version
          ffmpeg -version | Select-Object -First 1
        shell: pwsh

      # ── Install Node dependencies ─────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      # ── Build Tauri app ───────────────────────────────────────────────────────
      # tauri.conf.json defines beforeBuildCommand: "npm run build", so
      # tauri-action triggers the frontend build automatically. Do NOT add a
      # separate "npm run build" step — it causes a double-build race condition.
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          # GITHUB_TOKEN is automatically provided by GitHub Actions — no repo
          # secret required. Used by tauri-action for artifact uploads & releases.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc --bundles nsis

      # ── Upload installer as build artifact ───────────────────────────────────
      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdb22ccc2f5f15c0a9f0 # v4.6.0
        with:
          name: abi-yt-downloader-windows-x64-${{ github.sha }}
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

  # ── Create GitHub release on tag push ───────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444306234e1b09e8bff4e9f5 # v4.1.8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9f4c80f8c9f94ef521f4cbe0 # v2.2.1
        with:
          files: artifacts/**/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
